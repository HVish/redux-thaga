name: publish
on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

      - name: Read package version
        id: pkg
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          # SemVer pre-release identifier (anything with a hyphen, e.g. 1.0.0-rc.0)
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if tag already exists
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.pkg.outputs.version }} already exists. Bump package.json first."
            exit 1
          fi

      - name: Publish to npm
        # OIDC + trusted publishing handles auth; --provenance attaches the
        # cryptographic source attestation visible on npmjs.com. Pre-releases
        # publish under the `next` dist-tag so `npm install` keeps resolving
        # to the stable `latest`.
        run: npm publish --provenance --access public --tag ${{ steps.pkg.outputs.npm_tag }}

      - name: Tag and create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"
          prerelease_flag=""
          if [[ "${{ steps.pkg.outputs.prerelease }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            $prerelease_flag
